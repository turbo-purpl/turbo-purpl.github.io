<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MetalVPN • Личный кабинет</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Mr+Dafoe&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="user-info">
          <span class="avatar icon material-symbols-outlined">face</span>
          <p class="username">Incognito</p>
        </div>
        <div class="balance">
          <span class="label">Баланс</span>
          <span class="amount">1 250 ₽</span>
        </div>
      </header>

      <main class="app-main" id="content">
        <section class="card subscription-card">
          <div>
            <p class="eyebrow">Подписка активна</p>
            <h2>Metal Pro</h2>
          </div>
          <div class="time-remaining">
            <span>Осталось</span>
            <strong>12 дней · 6 часов</strong>
          </div>
          <div class="pulse-bar">
            <span></span>
          </div>
          <div class="subscription-meta">
            <div>
              <p class="label">Дата окончания</p>
              <p>12.12.2025</p>
            </div>
            <div style="text-align: right">
              <p class="label">Следующее списание</p>
              <p>799 ₽</p>
            </div>
          </div>
        </section>

        <section class="card speed-card">
          <header>Скорость</header>
          <div class="speed-graph">
            <svg viewBox="0 0 400 140" preserveAspectRatio="none">
              <defs>
                <linearGradient id="speedGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#3e88f7" />
                  <stop offset="100%" stop-color="#5fa1ff" />
                </linearGradient>
              </defs>
              <path
                class="speed-path"
                d="M0,90 C40,70 80,110 120,80 C160,50 200,60 240,90 C280,120 320,70 360,80"
              />
            </svg>
          </div>
          <div class="speed-meta">
            <div>
              <p class="label">Протокол</p>
              <p>OpenVPN</p>
            </div>
            <div style="text-align: right">
              <p class="label">Локация</p>
              <p>Нидерланды</p>
            </div>
          </div>
        </section>

        <section class="card devices-card">
          <div>
            <p class="label">Устройств в подписке</p>
            <p class="count">4 из 6</p>
          </div>
          <button class="primary-btn">Добавить устройство</button>
        </section>
      </main>

      <footer class="app-footer">
        <nav class="tab-bar" aria-label="Основная навигация">
          <div class="logo">Metal</div>
          <button class="tab-button active" data-view="home">
            <span class="icon material-symbols-outlined">home</span>
            <span>Главная</span>
          </button>
          <button class="tab-button" data-view="plans">
            <span class="icon material-symbols-outlined">sticky_note_2</span>
            <span>Тариф</span>
          </button>
          <button class="tab-button" data-view="billing">
            <span class="icon material-symbols-outlined">paid</span>
            <span>Оплата</span>
          </button>
          <button class="tab-button" data-view="guide">
            <span class="icon material-symbols-outlined">help_center</span>
            <span>Инструкция</span>
          </button>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
