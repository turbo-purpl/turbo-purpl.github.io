<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MetalVPN • Личный кабинет</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Mr+Dafoe&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="user-info">
          <span class="avatar icon material-symbols-outlined">face</span>
          <p class="username">Incognito</p>
        </div>
        <div class="balance">
          <span class="label">Баланс</span>
          <span class="amount">1 250 ₽</span>
        </div>
      </header>

      <main class="app-main" id="content"></main>

      <footer class="app-footer">
        <nav class="tab-bar" aria-label="Основная навигация">
          <div class="logo">Metal</div>
          <button class="tab-button active" data-view="home">
            <span class="icon material-symbols-outlined">home</span>
            <span>Главная</span>
          </button>
          <button class="tab-button" data-view="plans">
            <span class="icon material-symbols-outlined">sticky_note_2</span>
            <span>Тариф</span>
          </button>
          <button class="tab-button" data-view="billing">
            <span class="icon material-symbols-outlined">paid</span>
            <span>Оплата</span>
          </button>
          <button class="tab-button" data-view="guide">
            <span class="icon material-symbols-outlined">help_center</span>
            <span>Инструкция</span>
          </button>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
