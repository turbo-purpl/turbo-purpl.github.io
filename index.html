<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MetalVPN • Личный кабинет</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Mr+Dafoe&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript><link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Mr+Dafoe&display=swap"
      rel="stylesheet"
    /></noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      media="print"
      onload="this.media='all'"
    />
    <noscript><link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    /></noscript>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="logo-wrapper">
          <div class="logo-skeleton">Metal</div>
          <div class="logo">Metal</div>
        </div>
        <button class="topup-btn primary-btn" id="openTopupModal">Пополнить</button>
      </header>

      <main class="app-main" id="content"></main>

      <!-- iOS-style modal for settings -->
      <div class="modal-overlay" id="settingsModal">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-header">
            <h2 id="settingsModalTitle">Настройка</h2>
            <button class="modal-close" id="closeSettingsModal">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <div class="modal-content">
            <div class="settings-options" id="settingsOptions"></div>
          </div>
        </div>
      </div>

      <!-- iOS-style modal for topup -->
      <div class="modal-overlay" id="topupModal">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-header">
            <h2>Пополнить баланс</h2>
            <button class="modal-close" id="closeTopupModal">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <div class="modal-content">
            <div class="amount-selector">
              <button class="amount-btn" data-amount="100">100 ₽</button>
              <button class="amount-btn" data-amount="500">500 ₽</button>
              <button class="amount-btn" data-amount="1000">1 000 ₽</button>
              <button class="amount-btn" data-amount="2000">2 000 ₽</button>
            </div>
            <div class="custom-amount">
              <label>Или введите сумму</label>
              <input type="number" placeholder="0" min="1" class="amount-input" />
            </div>
            
            <div class="payment-methods">
              <label class="payment-methods-label">Способ оплаты</label>
              <div class="payment-methods-list">
                <button class="payment-method-btn" data-method="telegram-stars">
                  <div class="payment-method-icon telegram-stars-icon">
                    <span class="material-symbols-outlined">star</span>
                  </div>
                  <span>Telegram Stars</span>
                </button>
                <button class="payment-method-btn" data-method="ton-ton">
                  <div class="payment-method-icon ton-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                      <path fill="#0387c4" d="M19.012 9.201L12.66 19.316a.857.857 0 0 1-1.453-.005L4.98 9.197a1.8 1.8 0 0 1-.266-.943a1.856 1.856 0 0 1 1.882-1.826h10.817c1.033 0 1.873.815 1.873 1.822a1.8 1.8 0 0 1-.274.951M6.51 8.863l4.633 7.144V8.143H6.994c-.48 0-.694.317-.484.72m6.347 7.144l4.633-7.144c.214-.403-.004-.72-.484-.72h-4.149z"/>
                    </svg>
                  </div>
                  <span>TON-TON</span>
                </button>
                <button class="payment-method-btn" data-method="usdt-ton">
                  <div class="payment-method-icon usdt-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
                      <circle cx="24" cy="24" r="20" fill="#26a69a"></circle>
                      <rect width="18" height="5" x="15" y="13" fill="#fff"></rect>
                      <path fill="#fff" d="M24,21c-4.457,0-12,0.737-12,3.5S19.543,28,24,28s12-0.737,12-3.5S28.457,21,24,21z M24,26 c-5.523,0-10-0.895-10-2c0-1.105,4.477-2,10-2s10,0.895,10,2C34,25.105,29.523,26,24,26z"></path>
                      <path fill="#fff" d="M24,24c1.095,0,2.093-0.037,3-0.098V13h-6v10.902C21.907,23.963,22.905,24,24,24z"></path>
                      <path fill="#fff" d="M25.723,25.968c-0.111,0.004-0.223,0.007-0.336,0.01C24.932,25.991,24.472,26,24,26 s-0.932-0.009-1.387-0.021c-0.113-0.003-0.225-0.006-0.336-0.01c-0.435-0.015-0.863-0.034-1.277-0.06V36h6V25.908 C26.586,25.934,26.158,25.953,25.723,25.968z"></path>
                    </svg>
                  </div>
                  <span>USDT-TON</span>
                </button>
              </div>
            </div>
            
            <button class="modal-primary-btn">Пополнить</button>
          </div>
        </div>
      </div>

      <footer class="app-footer">
        <nav class="tab-bar" aria-label="Основная навигация">
          <button class="tab-button active" data-view="home">
            <span class="icon-wrapper">
              <span class="icon-skeleton"></span>
              <span class="icon material-symbols-outlined" style="display: none;">home</span>
            </span>
            <span>Главная</span>
          </button>
          <button class="tab-button" data-view="plans">
            <span class="icon-wrapper">
              <span class="icon-skeleton"></span>
              <span class="icon material-symbols-outlined" style="display: none;">sticky_note_2</span>
            </span>
            <span>Тариф</span>
          </button>
          <button class="tab-button" data-view="guide">
            <span class="icon-wrapper">
              <span class="icon-skeleton"></span>
              <span class="icon material-symbols-outlined" style="display: none;">help_center</span>
            </span>
            <span>Инструкция</span>
          </button>
          <button class="tab-button" data-view="profile">
            <span class="icon-wrapper">
              <span class="icon-skeleton"></span>
              <span class="icon material-symbols-outlined" style="display: none;">account_circle</span>
            </span>
            <span>Профиль</span>
          </button>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
